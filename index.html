      position: relative;
      overflow: hidden;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }
    .card-img-top {
      transition: transform 0.5s ease;
      width: 100%;

      font-weight: bold;

      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;

    .status-live {
      background: #e50914;
      color: #fff;
    }

      background: #0B7AAD;
      color: #fff;
