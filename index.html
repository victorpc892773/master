    .card {

      border: none;
      border-radius: 20px;

      transition: transform 0.4s ease, box-shadow 0.4s ease;
      overflow: hidden;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 15px 35px rgba(0,0,0,0.8);

      position: relative;
      overflow: hidden;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }

      transition: transform 0.5s ease;
      width: 100%;
      display: block;
    }
    .card:hover .card-img-top {
      transform: scale(1.08);
    }
    .card-title {
      color: #fff !important;
      font-weight: bold;
      font-size: 1.2rem;
    }

      color: #fff !important;
      margin-top: 8px;
      font-size: 0.95rem;
    }

      position: absolute;

      left: 10px;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }
    .status-live {
      background: #e50914;
      color: #fff;
    }
    .status-soon {
      background: #0B7AAD;
      color: #fff;
