      transition: transform 0.4s ease, box-shadow 0.4s ease;
      overflow: hidden;

      transform: translateY(-10px) scale(1.02);

      position: relative;
      overflow: hidden;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }
    .card-img-top {
      transition: transform 0.5s ease;
      width: 100%;
      display: block;
    }
    .card:hover .card-img-top {
      transform: scale(1.08);
    }

      color: #fff !important;
      font-weight: bold;
      font-size: 1.2rem;
    }

      color: #fff !important;

    }

      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }
    .status-live {
      background: #e50914;
      color: #fff;

      color: #fff;
