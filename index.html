    body {

      font-weight: bold;

      margin-right: 8px;

    @keyframes pulseText {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }

    .card-fade-in {
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .card-fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
    footer {
      text-align: center;
      margin-top: 40px;

      color: #7a9ab8;
      font-size: 0.82rem;
      line-height: 1.7;
    }
    .card {
      background: linear-gradient(145deg, #101b2d, #0d1423);
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      overflow: hidden;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 15px 35px rgba(0,0,0,0.8);
    }
    .card-img-container {
      position: relative;
      overflow: hidden;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }
    .card-img-top {
      transition: transform 0.5s ease;
      width: 100%;
      display: block;
    }
    .card:hover .card-img-top {
      transform: scale(1.08);
    }
    .card-title {
      color: #fff !important;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .horario {
      color: #fff !important;
      margin-top: 8px;
      font-size: 0.95rem;
    }
    .status-overlay {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }
    .status-live {
      background: #e50914;
      color: #fff;
    }
    .status-soon {
      background: #0B7AAD;
      color: #fff;
    }
    .botoes-nav {

      gap: 10px;
      flex-wrap: wrap;

      margin-bottom: 5px;

      cursor: pointer;

      color: #fff;
